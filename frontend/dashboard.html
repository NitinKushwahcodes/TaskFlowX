<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dashboard-layout">

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <a class="navbar-brand" href="#">
      <div class="nav-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <span>TaskFlow</span>
    </a>
    <div class="navbar-right">
      <div class="user-chip">
        <div class="avatar" id="userAvatar">N</div>
        <span id="userName">User</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="dashboard-main">

    <!-- Stats row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Tasks</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card stat-todo">
        <div class="stat-label">To Do</div>
        <div class="stat-value" id="statTodo">—</div>
      </div>
      <div class="stat-card stat-inprogress">
        <div class="stat-label">In Progress</div>
        <div class="stat-value" id="statProgress">—</div>
      </div>
      <div class="stat-card stat-done">
        <div class="stat-label">Done</div>
        <div class="stat-value" id="statDone">—</div>
      </div>
    </div>

    <!-- Create task panel -->
    <div class="create-panel">
      <h3>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        New Task
      </h3>
      <div class="create-fields">
        <div class="form-group full-width">
          <label for="newTitle">Title *</label>
          <input type="text" id="newTitle" placeholder="What needs to be done?" maxlength="100" />
        </div>
        <div class="form-group full-width">
          <label for="newDesc">Description</label>
          <input type="text" id="newDesc" placeholder="Optional details…" maxlength="500" />
        </div>
        <div class="form-group">
          <label for="newStatus">Status</label>
          <select id="newStatus">
            <option value="todo">To Do</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label for="newPriority">Priority</label>
          <select id="newPriority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="newDueDate">Due Date</label>
          <input type="date" id="newDueDate" />
        </div>
      </div>
      <div class="create-actions">
        <button class="btn btn-ghost btn-sm" onclick="clearCreateForm()">Clear</button>
        <button class="btn btn-primary btn-sm" id="createBtn" onclick="createTask()">
          Add Task
        </button>
      </div>
    </div>

    <!-- Toolbar: filters -->
    <div class="toolbar">
      <div class="toolbar-left">
        <select class="filter-select" id="filterStatus" onchange="applyFilters()">
          <option value="">All Statuses</option>
          <option value="todo">To Do</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>
        <select class="filter-select" id="filterPriority" onchange="applyFilters()">
          <option value="">All Priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Clear filters</button>
      </div>
    </div>

    <!-- Tasks section -->
    <div class="section-header">
      <h2>Your Tasks</h2>
      <span class="task-count-chip" id="taskCountChip">0 tasks</span>
    </div>

    <div id="taskList" class="task-list"></div>
    <div id="pagination" class="pagination"></div>

  </main>

  <!-- ── EDIT MODAL ── -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Task</h2>
        <button class="btn-icon" onclick="closeModal()" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId" />
        <div class="form-group">
          <label for="editTitle">Title *</label>
          <input type="text" id="editTitle" maxlength="100" />
        </div>
        <div class="form-group">
          <label for="editDesc">Description</label>
          <textarea id="editDesc" maxlength="500"></textarea>
        </div>
        <div class="modal-row">
          <div class="form-group">
            <label for="editStatus">Status</label>
            <select id="editStatus">
              <option value="todo">To Do</option>
              <option value="in-progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editPriority">Priority</label>
            <select id="editPriority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="editDueDate">Due Date</label>
          <input type="date" id="editDueDate" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="saveEditBtn" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST CONTAINER ── -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
